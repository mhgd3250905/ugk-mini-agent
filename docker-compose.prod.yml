services:
  ugk-pi:
    image: ugk-pi:prod
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APT_MIRROR_HOST: ${APT_MIRROR_HOST:-}
    init: true
    env_file:
      - ${UGK_APP_ENV_FILE:-.env}
    environment:
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-3000}
      WEB_ACCESS_BROWSER_PUBLIC_BASE_URL: http://ugk-pi:3000
      WEB_ACCESS_BROWSER_PROVIDER: direct_cdp
      WEB_ACCESS_CDP_HOST: 172.31.250.10
      WEB_ACCESS_CDP_PORT: 9223
      UGK_DEFAULT_BROWSER_ID: ${UGK_DEFAULT_BROWSER_ID:-default}
      UGK_BROWSER_INSTANCES_JSON: ${UGK_BROWSER_INSTANCES_JSON:-[{"browserId":"default","name":"Default","cdpHost":"172.31.250.10","cdpPort":9223,"guiUrl":"https://127.0.0.1:3901/","profileLabel":"chrome-sidecar"},{"browserId":"chrome-01","name":"chrome-01","cdpHost":"172.31.250.11","cdpPort":9223,"guiUrl":"https://127.0.0.1:3902/","profileLabel":"chrome-sidecar-chrome-01"},{"browserId":"chrome-02","name":"chrome-02","cdpHost":"172.31.250.12","cdpPort":9223,"guiUrl":"https://127.0.0.1:3903/","profileLabel":"chrome-sidecar-chrome-02"}]}
      UGK_BROWSER_SCOPE_ROUTE_CACHE_PATH: /app/.data/browser-scope-routes.json
      WEB_ACCESS_BROWSER_UPLOAD_APP_DIR: /app/.data/browser-upload
      WEB_ACCESS_BROWSER_UPLOAD_BROWSER_DIR: /config/upload
      UGK_MODEL_SETTINGS_PATH: /app/.data/agent/model-settings.json
      UGK_RUNTIME_DEPS_DIR: /app/.runtime-deps
      UGK_RUNTIME_PYTHON_VENV_DIR: /app/.runtime-deps/python-venv-linux
      VIRTUAL_ENV: /app/.runtime-deps/python-venv-linux
      PATH: /app/.runtime-deps/python-venv-linux/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      PLAYGROUND_EXTERNALIZED: ${PLAYGROUND_EXTERNALIZED:-0}
      SEARXNG_BASE_URL: http://ugk-pi-searxng:8080
      TEAM_RUNTIME_ENABLED: "true"
      TEAM_DATA_DIR: /app/.data/team
      TEAM_USE_MOCK_RUNNER: ${TEAM_USE_MOCK_RUNNER:-true}
    volumes:
      - ${UGK_APP_LOG_DIR:-./logs/app}:/var/log/ugk-pi
      - ${UGK_AGENT_DATA_DIR:-./.data/agent}:/app/.data/agent
      - ${UGK_AGENTS_DATA_DIR:-./.data/agents}:/app/.data/agents
      - ${UGK_TEAM_DATA_DIR:-./.data/team}:/app/.data/team
      - ${UGK_BROWSER_UPLOAD_DIR:-./.data/chrome-sidecar/upload}:/app/.data/browser-upload
      - ${UGK_RUNTIME_SKILLS_USER_DIR:-./runtime/skills-user}:/app/runtime/skills-user
      - ${UGK_RUNTIME_DEPS_HOST_DIR:-./.data/runtime-deps}:/app/.runtime-deps
    depends_on:
      ugk-pi-browser:
        condition: service_healthy
      ugk-pi-browser-cdp:
        condition: service_started
    restart: unless-stopped
    command: /bin/sh -c "mkdir -p /var/log/ugk-pi && { node scripts/runtime-deps.mjs init && npm start; } 2>&1 | tee -a /var/log/ugk-pi/app.log"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/healthz').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - ugk-pi-net
  ugk-pi-conn-worker:
    image: ugk-pi:prod
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APT_MIRROR_HOST: ${APT_MIRROR_HOST:-}
    init: true
    env_file:
      - ${UGK_APP_ENV_FILE:-.env}
    environment:
      CONN_WORKER_MAX_CONCURRENCY: ${CONN_WORKER_MAX_CONCURRENCY:-3}
      CONN_TEAM_API_BASE_URL: http://ugk-pi:3000
      NOTIFICATION_BROADCAST_URL: http://ugk-pi:3000/v1/internal/notifications/broadcast
      WEB_ACCESS_BROWSER_PUBLIC_BASE_URL: http://ugk-pi:3000
      WEB_ACCESS_BROWSER_PROVIDER: direct_cdp
      WEB_ACCESS_CDP_HOST: 172.31.250.10
      WEB_ACCESS_CDP_PORT: 9223
      UGK_DEFAULT_BROWSER_ID: ${UGK_DEFAULT_BROWSER_ID:-default}
      UGK_BROWSER_INSTANCES_JSON: ${UGK_BROWSER_INSTANCES_JSON:-[{"browserId":"default","name":"Default","cdpHost":"172.31.250.10","cdpPort":9223,"guiUrl":"https://127.0.0.1:3901/","profileLabel":"chrome-sidecar"},{"browserId":"chrome-01","name":"chrome-01","cdpHost":"172.31.250.11","cdpPort":9223,"guiUrl":"https://127.0.0.1:3902/","profileLabel":"chrome-sidecar-chrome-01"},{"browserId":"chrome-02","name":"chrome-02","cdpHost":"172.31.250.12","cdpPort":9223,"guiUrl":"https://127.0.0.1:3903/","profileLabel":"chrome-sidecar-chrome-02"}]}
      UGK_BROWSER_SCOPE_ROUTE_CACHE_PATH: /app/.data/browser-scope-routes.json
      WEB_ACCESS_BROWSER_UPLOAD_APP_DIR: /app/.data/browser-upload
      WEB_ACCESS_BROWSER_UPLOAD_BROWSER_DIR: /config/upload
      UGK_MODEL_SETTINGS_PATH: /app/.data/agent/model-settings.json
      UGK_RUNTIME_DEPS_DIR: /app/.runtime-deps
      UGK_RUNTIME_PYTHON_VENV_DIR: /app/.runtime-deps/python-venv-linux
      VIRTUAL_ENV: /app/.runtime-deps/python-venv-linux
      PATH: /app/.runtime-deps/python-venv-linux/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      PLAYGROUND_EXTERNALIZED: ${PLAYGROUND_EXTERNALIZED:-0}
      SEARXNG_BASE_URL: http://ugk-pi-searxng:8080
    volumes:
      - ${UGK_APP_LOG_DIR:-./logs/app}:/var/log/ugk-pi
      - ${UGK_AGENT_DATA_DIR:-./.data/agent}:/app/.data/agent
      - ${UGK_AGENTS_DATA_DIR:-./.data/agents}:/app/.data/agents
      - ${UGK_BROWSER_UPLOAD_DIR:-./.data/chrome-sidecar/upload}:/app/.data/browser-upload
      - ${UGK_RUNTIME_SKILLS_USER_DIR:-./runtime/skills-user}:/app/runtime/skills-user
      - ${UGK_RUNTIME_DEPS_HOST_DIR:-./.data/runtime-deps}:/app/.runtime-deps
    depends_on:
      ugk-pi-browser:
        condition: service_healthy
      ugk-pi-browser-cdp:
        condition: service_started
    restart: unless-stopped
    command: /bin/sh -c "mkdir -p /var/log/ugk-pi && { node scripts/runtime-deps.mjs init && npm run worker:conn; } 2>&1 | tee -a /var/log/ugk-pi/conn-worker.log"
    healthcheck:
      disable: true
    networks:
      - ugk-pi-net
  ugk-pi-team-worker:
    image: ugk-pi:prod
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APT_MIRROR_HOST: ${APT_MIRROR_HOST:-}
    init: true
    env_file:
      - ${UGK_APP_ENV_FILE:-.env}
    environment:
      TEAM_RUNTIME_ENABLED: "true"
      TEAM_DATA_DIR: /app/.data/team
      TEAM_USE_MOCK_RUNNER: ${TEAM_USE_MOCK_RUNNER:-true}
      UGK_MODEL_SETTINGS_PATH: /app/.data/agent/model-settings.json
      UGK_RUNTIME_DEPS_DIR: /app/.runtime-deps
      UGK_RUNTIME_PYTHON_VENV_DIR: /app/.runtime-deps/python-venv-linux
      VIRTUAL_ENV: /app/.runtime-deps/python-venv-linux
      PATH: /app/.runtime-deps/python-venv-linux/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      PLAYGROUND_EXTERNALIZED: ${PLAYGROUND_EXTERNALIZED:-0}
      WEB_ACCESS_BROWSER_PUBLIC_BASE_URL: http://ugk-pi:3000
      WEB_ACCESS_BROWSER_PROVIDER: direct_cdp
      WEB_ACCESS_CDP_HOST: 172.31.250.10
      WEB_ACCESS_CDP_PORT: 9223
      UGK_DEFAULT_BROWSER_ID: ${UGK_DEFAULT_BROWSER_ID:-default}
      UGK_BROWSER_INSTANCES_JSON: ${UGK_BROWSER_INSTANCES_JSON:-[{"browserId":"default","name":"Default","cdpHost":"172.31.250.10","cdpPort":9223,"guiUrl":"https://127.0.0.1:3901/","profileLabel":"chrome-sidecar"},{"browserId":"chrome-01","name":"chrome-01","cdpHost":"172.31.250.11","cdpPort":9223,"guiUrl":"https://127.0.0.1:3902/","profileLabel":"chrome-sidecar-chrome-01"},{"browserId":"chrome-02","name":"chrome-02","cdpHost":"172.31.250.12","cdpPort":9223,"guiUrl":"https://127.0.0.1:3903/","profileLabel":"chrome-sidecar-chrome-02"}]}
      UGK_BROWSER_SCOPE_ROUTE_CACHE_PATH: /app/.data/browser-scope-routes.json
      WEB_ACCESS_BROWSER_UPLOAD_APP_DIR: /app/.data/browser-upload
      WEB_ACCESS_BROWSER_UPLOAD_BROWSER_DIR: /config/upload
    volumes:
      - ${UGK_APP_LOG_DIR:-./logs/app}:/var/log/ugk-pi
      - ${UGK_AGENT_DATA_DIR:-./.data/agent}:/app/.data/agent
      - ${UGK_AGENTS_DATA_DIR:-./.data/agents}:/app/.data/agents
      - ${UGK_TEAM_DATA_DIR:-./.data/team}:/app/.data/team
      - ${UGK_BROWSER_UPLOAD_DIR:-./.data/chrome-sidecar/upload}:/app/.data/browser-upload
      - ${UGK_RUNTIME_SKILLS_USER_DIR:-./runtime/skills-user}:/app/runtime/skills-user
      - ${UGK_RUNTIME_DEPS_HOST_DIR:-./.data/runtime-deps}:/app/.runtime-deps
    depends_on:
      ugk-pi:
        condition: service_healthy
    restart: unless-stopped
    command: /bin/sh -c "mkdir -p /var/log/ugk-pi && { node scripts/runtime-deps.mjs init && npm run worker:team; } 2>&1 | tee -a /var/log/ugk-pi/team-worker.log"
    healthcheck:
      disable: true
    networks:
      - ugk-pi-net
  ugk-pi-feishu-worker:
    image: ugk-pi:prod
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APT_MIRROR_HOST: ${APT_MIRROR_HOST:-}
    init: true
    env_file:
      - ${UGK_APP_ENV_FILE:-.env}
    environment:
      FEISHU_AGENT_BASE_URL: http://ugk-pi:3000
      PLAYGROUND_EXTERNALIZED: ${PLAYGROUND_EXTERNALIZED:-0}
    volumes:
      - ${UGK_APP_LOG_DIR:-./logs/app}:/var/log/ugk-pi
      - ${UGK_AGENT_DATA_DIR:-./.data/agent}:/app/.data/agent
      - ${UGK_AGENTS_DATA_DIR:-./.data/agents}:/app/.data/agents
    depends_on:
      ugk-pi:
        condition: service_healthy
    restart: unless-stopped
    command: /bin/sh -c "mkdir -p /var/log/ugk-pi && npm run worker:feishu 2>&1 | tee -a /var/log/ugk-pi/feishu-worker.log"
    healthcheck:
      disable: true
    networks:
      - ugk-pi-net
  ugk-pi-browser:
    image: lscr.io/linuxserver/chrome:latest
    environment:
      PUID: 1000
      PGID: 1000
      TZ: ${TZ:-Asia/Shanghai}
      DISPLAY: ":0"
      SELKIES_USE_BROWSER_CURSORS: "true"
      WEB_ACCESS_BROWSER_PROFILE_DIR: ${WEB_ACCESS_BROWSER_PROFILE_DIR:-/config/chrome-profile-sidecar}
      CHROME_CLI: "--remote-debugging-address=0.0.0.0 --remote-debugging-port=9222 --hide-crash-restore-bubble --js-flags=--max-old-space-size=1536 --ozone-platform=x11 --user-data-dir=${WEB_ACCESS_BROWSER_PROFILE_DIR:-/config/chrome-profile-sidecar} about:blank"
    volumes:
      - ${UGK_BROWSER_CONFIG_DIR:-./.data/chrome-sidecar}:/config
      - ${UGK_BROWSER_UPLOAD_DIR:-./.data/chrome-sidecar/upload}:/config/upload
      - ./scripts/ensure-sidecar-chrome.sh:/usr/local/bin/ensure-sidecar-chrome.sh:ro
    ports:
      - "127.0.0.1:${WEB_ACCESS_BROWSER_GUI_PORT:-3901}:3001"
    shm_size: "1gb"
    mem_limit: ${UGK_BROWSER_MEM_LIMIT:-2g}
    mem_reservation: ${UGK_BROWSER_MEM_RESERVATION:-512m}
    security_opt:
      - seccomp:unconfined
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "sh /usr/local/bin/ensure-sidecar-chrome.sh"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 20s
    networks:
      ugk-pi-net:
        ipv4_address: 172.31.250.10
  ugk-pi-browser-cdp:
    image: alpine/socat:latest
    depends_on:
      ugk-pi-browser:
        condition: service_healthy
    network_mode: "service:ugk-pi-browser"
    command:
      - "TCP-LISTEN:9223,fork,bind=0.0.0.0,reuseaddr"
      - "TCP:127.0.0.1:9222"
    restart: unless-stopped
  ugk-pi-browser-chrome-01:
    image: lscr.io/linuxserver/chrome:latest
    environment:
      PUID: 1000
      PGID: 1000
      TZ: ${TZ:-Asia/Shanghai}
      DISPLAY: ":0"
      SELKIES_USE_BROWSER_CURSORS: "true"
      WEB_ACCESS_BROWSER_PROFILE_DIR: ${WEB_ACCESS_BROWSER_CHROME_01_PROFILE_DIR:-/config/chrome-profile-sidecar}
      CHROME_CLI: "--remote-debugging-address=0.0.0.0 --remote-debugging-port=9222 --hide-crash-restore-bubble --js-flags=--max-old-space-size=1536 --ozone-platform=x11 --user-data-dir=${WEB_ACCESS_BROWSER_CHROME_01_PROFILE_DIR:-/config/chrome-profile-sidecar} about:blank"
    volumes:
      - ${UGK_BROWSER_CHROME_01_CONFIG_DIR:-./.data/chrome-sidecar-chrome-01}:/config
      - ${UGK_BROWSER_CHROME_01_UPLOAD_DIR:-./.data/chrome-sidecar-chrome-01/upload}:/config/upload
      - ./scripts/ensure-sidecar-chrome.sh:/usr/local/bin/ensure-sidecar-chrome.sh:ro
    ports:
      - "127.0.0.1:${WEB_ACCESS_BROWSER_CHROME_01_GUI_PORT:-3902}:3001"
    shm_size: "1gb"
    mem_limit: ${UGK_BROWSER_CHROME_01_MEM_LIMIT:-2g}
    mem_reservation: ${UGK_BROWSER_CHROME_01_MEM_RESERVATION:-512m}
    security_opt:
      - seccomp:unconfined
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "sh /usr/local/bin/ensure-sidecar-chrome.sh"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 20s
    networks:
      ugk-pi-net:
        ipv4_address: 172.31.250.11
  ugk-pi-browser-chrome-01-cdp:
    image: alpine/socat:latest
    depends_on:
      ugk-pi-browser-chrome-01:
        condition: service_healthy
    network_mode: "service:ugk-pi-browser-chrome-01"
    command:
      - "TCP-LISTEN:9223,fork,bind=0.0.0.0,reuseaddr"
      - "TCP:127.0.0.1:9222"
    restart: unless-stopped
  ugk-pi-browser-chrome-02:
    image: lscr.io/linuxserver/chrome:latest
    environment:
      PUID: 1000
      PGID: 1000
      TZ: ${TZ:-Asia/Shanghai}
      DISPLAY: ":0"
      SELKIES_USE_BROWSER_CURSORS: "true"
      WEB_ACCESS_BROWSER_PROFILE_DIR: ${WEB_ACCESS_BROWSER_CHROME_02_PROFILE_DIR:-/config/chrome-profile-sidecar}
      CHROME_CLI: "--remote-debugging-address=0.0.0.0 --remote-debugging-port=9222 --hide-crash-restore-bubble --js-flags=--max-old-space-size=1536 --ozone-platform=x11 --user-data-dir=${WEB_ACCESS_BROWSER_CHROME_02_PROFILE_DIR:-/config/chrome-profile-sidecar} about:blank"
    volumes:
      - ${UGK_BROWSER_CHROME_02_CONFIG_DIR:-./.data/chrome-sidecar-chrome-02}:/config
      - ${UGK_BROWSER_CHROME_02_UPLOAD_DIR:-./.data/chrome-sidecar-chrome-02/upload}:/config/upload
      - ./scripts/ensure-sidecar-chrome.sh:/usr/local/bin/ensure-sidecar-chrome.sh:ro
    ports:
      - "127.0.0.1:${WEB_ACCESS_BROWSER_CHROME_02_GUI_PORT:-3903}:3001"
    shm_size: "1gb"
    mem_limit: ${UGK_BROWSER_CHROME_02_MEM_LIMIT:-2g}
    mem_reservation: ${UGK_BROWSER_CHROME_02_MEM_RESERVATION:-512m}
    security_opt:
      - seccomp:unconfined
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "sh /usr/local/bin/ensure-sidecar-chrome.sh"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 20s
    networks:
      ugk-pi-net:
        ipv4_address: 172.31.250.12
  ugk-pi-browser-chrome-02-cdp:
    image: alpine/socat:latest
    depends_on:
      ugk-pi-browser-chrome-02:
        condition: service_healthy
    network_mode: "service:ugk-pi-browser-chrome-02"
    command:
      - "TCP-LISTEN:9223,fork,bind=0.0.0.0,reuseaddr"
      - "TCP:127.0.0.1:9222"
    restart: unless-stopped
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      ugk-pi:
        condition: service_healthy
    ports:
      - "${HOST_PORT:-3000}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${UGK_NGINX_LOG_DIR:-./logs/nginx}:/var/log/nginx
    restart: unless-stopped
    networks:
      - ugk-pi-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
  ugk-pi-searxng:
    image: searxng/searxng:latest
    environment:
      SEARXNG_BASE_URL: http://127.0.0.1:${SEARXNG_HOST_PORT:-48080}
      SEARXNG_SECRET: ${SEARXNG_SECRET:-replace-me-with-random-secret}
    volumes:
      - ${UGK_SEARXNG_CONFIG_DIR:-./deploy/searxng}:/etc/searxng:ro
      - ${UGK_SEARXNG_CACHE_DIR:-./.data/searxng}:/var/cache/searxng
    ports:
      - "127.0.0.1:${SEARXNG_HOST_PORT:-48080}:8080"
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    mem_limit: ${UGK_SEARXNG_MEM_LIMIT:-512m}
    mem_reservation: ${UGK_SEARXNG_MEM_RESERVATION:-128m}
    networks:
      - ugk-pi-net

networks:
  ugk-pi-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.250.0/24
